experiment:
  parameterization: meanvar
  output_dir: results
  device: cuda

model:
  width: 1024
  variance_min: 0.001
  variance_max: 10.0
  precision_activation: exp

data:
  dataset_pattern: homoskedastic_wave
  train_size: 1000
  test_size: 1000
  x_max: 1.05

train:
  epochs: 10000
  batch_size: 1000
  learning_rate: 0.1
  learning_rate_min: 0.001
  weight_decay: 0.0

evaluation:
  barrier_points: 25
  probe_points: 2048

visualization:
  plot_points: 2048

seeds:
  data: 2026
  model_a: 0
  model_b: 1
